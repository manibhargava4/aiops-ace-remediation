groups:
  - name: ace
    rules:
      - alert: ACEHighCPU
        # Local: fires ~30s after the hung thread pegs the core.
        # EKS variant (k8s/monitoring) uses container_cpu_usage_seconds_total and for: 3m.
        expr: rate(process_cpu_seconds_total{job="ace-sim"}[1m]) > 0.8
        for: 30s
        labels:
          severity: critical
          service: ace-sim
          flow: ORDER_FLOW
        annotations:
          summary: "ACE integration server CPU pegged — possible hung flow thread"
          description: "process CPU rate {{ $value | printf \"%.2f\" }} cores on {{ $labels.instance }} for over 30s."
