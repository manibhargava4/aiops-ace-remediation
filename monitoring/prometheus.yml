# Local demo config — fast scrape/eval so the incident fires in ~1 minute.
# The EKS deployment uses kube-prometheus-stack defaults (see k8s/monitoring).
global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: ace-sim
    static_configs:
      - targets: ["ace-sim:8000"]
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
