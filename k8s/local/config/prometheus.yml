# minikube variant — targets are k8s service DNS names
global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alert_rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager.monitoring:9093"]

scrape_configs:
  - job_name: ace-sim
    static_configs:
      - targets: ["ace-sim.ace:8000"]
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
