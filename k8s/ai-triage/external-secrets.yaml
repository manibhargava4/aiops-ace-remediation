# External Secrets Operator: sync the GitHub token from AWS Secrets Manager into
# a Kubernetes Secret, so the triage pod's `github-token` secretKeyRef resolves.
# Prereq: `helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace`
# and a Secrets Manager secret named `aiops-ace/github-token` with key `token`.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets
  namespace: aiops
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        # IRSA again — the operator's ServiceAccount assumes an IAM role scoped to
        # GetSecretValue on this secret. No static credentials in the cluster.
        jwt:
          serviceAccountRef:
            name: ai-triage
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: github-token
  namespace: aiops
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets
    kind: SecretStore
  target:
    name: github-token # the Secret the Deployment mounts
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: aiops-ace/github-token
        property: token
