name: gitops-cd

# Pull-based GitOps: CI builds, scans, pushes to GHCR, and commits the new image
# tags to k8s/local/. It NEVER touches the cluster — ArgoCD (running on minikube)
# watches this repo and reconciles the cluster to match git.
# Contrast with ci/Jenkinsfile (push-based: pipeline runs kubectl itself).

on:
  push:
    branches: [main]
    paths: [app/**, ai-triage/**]
  workflow_dispatch: {} # website / gh CLI trigger

permissions:
  contents: write # commit the kustomize tag bump back
  packages: write # push to ghcr.io

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: app
            image: ace-sim
          - service: ai-triage
            image: ai-triage
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: docker build -t $REGISTRY/${{ matrix.image }}:${{ github.sha }} ${{ matrix.service }}

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ matrix.image }}:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Push to GHCR
        if: ${{ !env.ACT }} # act (local run) builds+scans only; no push without creds
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker push $REGISTRY/${{ matrix.image }}:${{ github.sha }}

  bump-manifests:
    needs: build-scan-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bump image tags (the GitOps "deploy")
        if: ${{ !env.ACT }} # act (local run) stops after build+scan
        run: |
          cd k8s/local
          kustomize edit set image \
            ace-sim=$REGISTRY/ace-sim:${{ github.sha }} \
            ai-triage=$REGISTRY/ai-triage:${{ github.sha }}

      - name: Commit back
        if: ${{ !env.ACT }}
        run: |
          git config user.name "gitops-bot"
          git config user.email "actions@github.com"
          git add k8s/local/kustomization.yaml
          git diff --cached --quiet && exit 0
          git commit -m "gitops: bump images to ${{ github.sha }} [skip ci]"
          git push
